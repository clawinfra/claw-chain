name: Agent Harness Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  agent-lint:
    name: Agent architectural invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run agent lints
        run: bash scripts/agent-lint.sh

  clippy:
    name: Clippy (Rust lints)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y llvm clang libclang-dev protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy
        run: cargo clippy --workspace --lib -- -D warnings
        env:
          SKIP_WASM_BUILD: 1

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y llvm clang libclang-dev protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --workspace --lib
        env:
          SKIP_WASM_BUILD: 1
