name: Security Audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Run daily at 06:00 UTC to catch new advisories
    - cron: '0 6 * * *'

permissions:
  contents: read
  issues: write

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit Rust dependencies
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Ignore advisories for Substrate transitive dependencies we cannot directly upgrade.
          # These are deep runtime deps (wasmtime, ring) pulled in by the Polkadot/Substrate
          # ecosystem — tracked upstream and will be resolved via substrate version bumps.
          ignore: RUSTSEC-2025-0009,RUSTSEC-2026-0020,RUSTSEC-2026-0006,RUSTSEC-2026-0021,RUSTSEC-2025-0118
