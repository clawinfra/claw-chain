name: Security Audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Run daily at 06:00 UTC to catch new advisories
    - cron: '0 6 * * *'

permissions:
  contents: read
  issues: write
  checks: write

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit Rust dependencies
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Ignored advisories — all are Substrate ecosystem hard-locks.
          # wasmtime 35.x: sc-executor-wasmtime locked, resolves when Substrate upgrades.
          # keccak 0.1.5: yanked/unsound ARMv8 asm — Substrate dep, patched in >=0.1.6 but not yet pulled.
          # lru 0.12.5: IterMut stacked-borrows unsound — Substrate dep, patched in >=0.16.3.
          ignore: "RUSTSEC-2026-0020,RUSTSEC-2026-0006,RUSTSEC-2026-0021,RUSTSEC-2025-0118,RUSTSEC-2025-0009,RUSTSEC-2026-0012,RUSTSEC-2026-0002"
