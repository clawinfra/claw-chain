name: Security Audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Run daily at 06:00 UTC to catch new advisories
    - cron: '0 6 * * *'

permissions:
  contents: read
  issues: write

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit Rust dependencies
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # wasmtime 35.x is pulled by sc-executor-wasmtime (Substrate runtime).
          # Substrate has not yet upgraded beyond wasmtime 35 — tracked upstream.
          # Will be resolved when Substrate releases a version with wasmtime >=41.
          ignore: "RUSTSEC-2026-0020,RUSTSEC-2026-0006,RUSTSEC-2026-0021,RUSTSEC-2025-0118,RUSTSEC-2025-0009"
