[advisories]

# RUSTSEC-2026-0037: Denial of service in Quinn endpoints (quinn-proto)
#
# This advisory affects quinn-proto < 0.11.14. Our dependency tree already
# resolves quinn-proto to 0.11.14 (the patched version), even though the
# `quinn` wrapper crate itself is at 0.11.9. Cargo's semver resolver pulls in
# quinn-proto >= 0.11.14 transitively, so the vulnerable code path is not
# present in this build.
#
# A newer `quinn` wrapper release (>= 0.11.14) does not yet exist on crates.io
# as of 2026-03-23. This exception should be removed once `quinn >= 0.11.14`
# is published and the upstream substrate dependency is bumped accordingly.
#
# Verify: `cargo metadata --format-version 1 | python3 -c "import json,sys; d=json.load(sys.stdin); [print(p['version']) for p in d['packages'] if p['name']=='quinn-proto']"`
# Expected: 0.11.14
#
# Tracked in: https://github.com/clawinfra/claw-chain/issues/67
#
# RUSTSEC-2025-0161: libsecp256k1 is unmaintained
#
# libsecp256k1 0.7.2 is pulled in transitively via sp-io and sp-core (Substrate).
# This is an "unmaintained" advisory, not a vulnerability. The crate still
# functions correctly for ECDSA secp256k1 operations. Migrating to k256 would
# require patching Substrate's own crypto crates, which is not feasible until
# upstream (paritytech/polkadot-sdk) addresses it.
#
# Tracked in: https://github.com/clawinfra/claw-chain/issues/98
#
# RUSTSEC-2026-0087: Cranelift f64x2.splat SIMD miscompilation
# RUSTSEC-2026-0006: Cranelift f64.copysign sign-bit corruption
#
# Not exposed: claw-chain does not include pallet-contracts; only trusted runtime
# WASM (compiled by us) executes via sc-executor. Untrusted WASM execution path
# does not exist.
#
# Both CVEs affect Cranelift's JIT compiler when executing UNTRUSTED WebAssembly.
# They are NOT reachable in claw-chain because:
#
#   1. claw-chain does NOT include pallet-contracts in construct_runtime!
#      Verified: `grep -r "pallet_contracts\|pallet-contracts" runtime/ node/ pallets/`
#      returns NO results (checked 2026-04-20).
#
#   2. Only TRUSTED runtime WASM (compiled from runtime/src/ by our own CI)
#      executes via sc-executor. There is no untrusted-WASM execution path.
#
#   3. The attack vector requires an attacker-supplied WASM binary reaching
#      the Cranelift JIT. In claw-chain, all WASM is the chain's own runtime
#      blob, produced by CI and upgraded only via on-chain governance.
#
# Will be re-evaluated if pallet-contracts is ever added.
# Root cause: wasmtime 35.0.0 via sc-executor 0.47. Real fix: polkadot-sdk
# upgrade to wasmtime 36+. Tracked: https://github.com/clawinfra/claw-chain/issues/101
#
ignore = ["RUSTSEC-2026-0037", "RUSTSEC-2025-0161", "RUSTSEC-2026-0087", "RUSTSEC-2026-0006"]
